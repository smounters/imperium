# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish Imperium

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: imperium-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_package:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Resolve package version from git tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '${tag}'. Use vX.Y.Z."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version with tag
        run: pnpm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build package
        run: pnpm run build

      - name: Publish package to npm
        run: npm publish --access public --provenance

  build_docs:
    name: Build documentation
    needs: publish_package
    runs-on: ubuntu-latest
    env:
      DOCS_BASE: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile

      - name: Build VitePress docs
        run: pnpm run docs:build

      - name: Upload docs artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy_docs:
    name: Deploy documentation
    needs: build_docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  create_release:
    name: Create GitHub release
    needs:
      - publish_package
      - deploy_docs
    runs-on: ubuntu-latest
    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
