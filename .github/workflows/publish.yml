name: Publish Imperium

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: imperium-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version from tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid tag '${tag}'. Use vX.Y.Z."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Sync package version with tag
        run: pnpm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Typecheck package
        run: pnpm run typecheck

      - name: Build package
        run: pnpm run build

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build_docs:
    needs: publish_package
    runs-on: ubuntu-latest
    env:
      DOCS_BASE: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy_docs:
    needs: build_docs
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
