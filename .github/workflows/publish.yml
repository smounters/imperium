# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish

on:
  push:
    tags:
      - "v*.*.*"
      - "*/v*.*.*"
      - "all/v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect packages to publish
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
      version: ${{ steps.detect.outputs.version }}
      publish_docs: ${{ steps.detect.outputs.publish_docs }}
    steps:
      - name: Parse tag
        id: detect
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ "$tag" =~ ^all/v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo 'packages=["@smounters/imperium","@smounters/imperium-cron","@smounters/imperium-events"]' >> "$GITHUB_OUTPUT"
            echo "publish_docs=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo 'packages=["@smounters/imperium"]' >> "$GITHUB_OUTPUT"
            echo "publish_docs=true" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^imperium-cron/v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo 'packages=["@smounters/imperium-cron"]' >> "$GITHUB_OUTPUT"
            echo "publish_docs=false" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^imperium-events/v([0-9]+\.[0-9]+\.[0-9]+.*)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo 'packages=["@smounters/imperium-events"]' >> "$GITHUB_OUTPUT"
            echo "publish_docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown tag format '${tag}'. Use vX.Y.Z, imperium-cron/vX.Y.Z, imperium-events/vX.Y.Z, or all/vX.Y.Z"
            exit 1
          fi

  publish:
    name: Publish ${{ matrix.package }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: pnpm --filter "${{ matrix.package }}" exec pnpm version "${{ needs.detect.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build core (required by all packages)
        run: pnpm --filter @smounters/imperium run build

      - name: Typecheck
        run: pnpm --filter "${{ matrix.package }}" run typecheck

      - name: Test
        run: pnpm --filter "${{ matrix.package }}" run test

      - name: Build
        run: pnpm --filter "${{ matrix.package }}" run build

      - name: Publish to npm
        run: pnpm --filter "${{ matrix.package }}" publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docs:
    name: Deploy docs to GitHub Pages
    needs: [detect, publish]
    if: needs.detect.outputs.publish_docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: pnpm run docs:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/imperium/docs/.vitepress/dist

  release:
    name: Create release
    needs: [detect, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
