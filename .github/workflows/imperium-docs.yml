name: Deploy Imperium Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "packages/imperium/docs/**"
      - "packages/imperium/src/**"
      - "packages/imperium/README.md"
      - "packages/imperium/package.json"
      - ".github/workflows/imperium-docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: imperium-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_BASE: /${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build docs
        run: pnpm --filter @cryppex/imperium run docs:build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/imperium/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
